<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crew Mission Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>🚀 The Crew Mission Generator</h1>
            <p>Generate custom mission combinations for "Mission Deep Sea"</p>
        </header>

        <section class="controls" aria-label="Mission Parameters">
            <div class="control-group">
                <label for="method">Selection Method:</label>
                <select id="method">
                    <option value="deck" selected>📚 Deck Draw (Official Rules)</option>
                    <option value="greedy">🎲 Greedy Selection (Legacy)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="missionSet">Mission Set:</label>
                <select id="missionSet">
                    <option value="classic" selected>Classic Missions</option>
                    <option value="custom">Custom Missions</option>
                    <option value="mixed">Mixed (Classic + Custom)</option>
                </select>
                <span id="missionCount" class="mission-count" aria-live="polite"></span>
            </div>

            <div class="control-group">
                <label for="players">Number of Players:</label>
                <select id="players">
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                    <option value="5">5 Players</option>
                </select>
            </div>

            <div class="control-group">
                <label for="useModifiers">Mission Modifiers:</label>
                <select id="useModifiers">
                    <option value="none" selected>None</option>
                    <option value="random">Random Modifier</option>
                    <option value="multiple">Multiple Modifiers</option>
                </select>
            </div>

            <div class="control-group">
                <label for="difficulty">Target Difficulty:</label>
                <input type="number" id="difficulty" min="1" max="50" value="10"
                       placeholder="Enter target difficulty">
                <span id="difficultyRange" class="difficulty-range" aria-live="polite"></span>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="generateBtn" type="button">
                    <span aria-hidden="true">🎯</span> Generate Missions
                </button>
                <button class="btn-secondary" id="clearBtn" type="button">
                    <span aria-hidden="true">🔄</span> Clear Results
                </button>
            </div>
        </section>

        <section class="results" id="results" aria-live="polite" aria-label="Generated Missions">
            <div class="no-results">
                <span aria-hidden="true">🎲</span> Select your parameters and click "Generate Missions" to get started!
            </div>
        </section>

        <footer class="footer">
            Made with ❤️ for The Crew enthusiasts
        </footer>
    </main>

    <script src="js/constants.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/modifiers.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
